<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthia Hub</title>
    <link rel="icon" href="galaxy.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to Synthia Hub</h1>
        <nav>
            <a href="/">Home</a> | <a href="/about">About</a> | <a href="/contact">Contact</a>
        </nav>
    </header>

    <main>
        <div class="tab-buttons">
            <button onclick="showTab('keyStored')">Key Stored</button>
            <button onclick="showTab('hwidStored')">HWID Stored</button>
        </div>

        <div class="tab-buttons centered">
            <button class="generate" onclick="generateKey()">Generate Key</button>
            <button class="generate" onclick="resetHwid()">Reset HWID</button>
        </div>

        <div id="keyStored" class="tab-content">
            <h2>Stored Keys</h2>
            <p id="keyList">Loading...</p>
        </div>

        <div id="hwidStored" class="tab-content">
            <h2>Stored HWIDs</h2>
            <p id="hwidList">Loading...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Synthia Hub</p>
    </footer>

    <script>
        // Function to show the selected tab
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            document.getElementById(tabId).style.display = 'block';

            // Update active button state
            document.querySelectorAll('.tab-buttons button').forEach(button => {
                button.classList.remove('active');
            });
            document.querySelector(`.tab-buttons button[onclick="showTab('${tabId}')"]`).classList.add('active');
        }

        // Show the default tab
        showTab('keyStored');

        // Function to generate a new key
        async function generateKey() {
            try {
                const response = await fetch('/generate-key', { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    alert(`New Key Generated: ${result.key}`);
                    fetchKeysAndHwids(); // Refresh keys and HWIDs
                } else {
                    alert('Failed to generate key');
                }
            } catch (error) {
                alert('Error generating key');
            }
        }

        // Function to reset HWID
        async function resetHwid() {
            const key = prompt('Enter the key to reset HWID:');
            try {
                const response = await fetch('/reset-hwid', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const result = await response.json();
                alert(result.message);
                fetchKeysAndHwids(); // Refresh keys and HWIDs
            } catch (error) {
                alert('Error resetting HWID');
            }
        }

        // Function to fetch and display keys and HWIDs
        async function fetchKeysAndHwids() {
            try {
                const response = await fetch('/KeyRaw');
                if (response.ok) {
                    const data = await response.text();
                    const keyList = document.getElementById('keyList');
                    keyList.innerHTML = `<pre>${data}</pre>`;
                    const hwidList = document.getElementById('hwidList');
                    hwidList.innerHTML = `<pre>${data}</pre>`;
                } else {
                    document.getElementById('keyList').innerText = 'Failed to load keys.';
                    document.getElementById('hwidList').innerText = 'Failed to load HWIDs.';
                }
            } catch (error) {
                document.getElementById('keyList').innerText = 'Error loading keys.';
                document.getElementById('hwidList').innerText = 'Error loading HWIDs.';
            }
        }

        // Fetch keys and HWIDs when the page loads
        window.onload = fetchKeysAndHwids;
    </script>
</body>
</html>
